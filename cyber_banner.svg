<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050508" />
      <stop offset="50%" stop-color="#0a0813" />
      <stop offset="100%" stop-color="#020204" />
    </linearGradient>

    <!-- Purple Neon Glow Filter -->
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur1" />
      <feGaussianBlur stdDeviation="15" result="blur2" />
      <feMerge>
        <feMergeNode in="blur2" />
        <feMergeNode in="blur1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Subtle White Glow Filter -->
    <filter id="whiteGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    /* Global Styles */
    @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&amp;family=Share+Tech+Mono&amp;display=swap');
    
    .title {
      font-family: 'Share Tech Mono', monospace;
      font-size: 42px;
      fill: #ffffff;
      font-weight: 700;
      letter-spacing: 6px;
      filter: url(#neonGlow);
    }
    
    .subtitle {
      font-family: 'Fira Code', monospace;
      font-size: 16px;
      fill: #a855f7;
      font-weight: 400;
      letter-spacing: 2px;
    }
    
    .console-text {
      font-family: 'Fira Code', monospace;
      font-size: 11px;
      fill: #6b7280;
    }
    
    .status-active {
      fill: #a855f7;
      font-weight: bold;
      animation: pulse 2s infinite;
    }

    /* Keyframe Animations */
    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; filter: drop-shadow(0 0 4px #a855f7); }
    }

    @keyframes drawCircuit {
      to { stroke-dashoffset: 0; }
    }

    @keyframes scanline {
      0% { transform: translateY(-200px); }
      100% { transform: translateY(200px); }
    }

    @keyframes typewrite {
      from { width: 0; }
      to { width: 100%; }
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    /* Circuit Lines Animating */
    .circuit-path {
      stroke: #a855f7;
      stroke-width: 1.5;
      fill: none;
      stroke-opacity: 0.3;
      stroke-dasharray: 600;
      stroke-dashoffset: 600;
      animation: drawCircuit 4s cubic-bezier(0.4, 0, 0.2, 1) forwards infinite;
    }
    
    .circuit-dot {
      fill: #a855f7;
      opacity: 0.7;
      animation: pulse 1.5s infinite;
    }

    /* Grid Overlay style */
    .grid {
      stroke: #1f1a3a;
      stroke-width: 0.5;
      stroke-opacity: 0.4;
    }

    /* Cursor */
    .cursor {
      fill: #a855f7;
      animation: blink 1s infinite;
    }
  </style>

  <!-- Background -->
  <rect width="800" height="200" fill="url(#bgGrad)" />

  <!-- Animated Tech Grid -->
  <g class="grid">
    <path d="M 0,25 L 800,25 M 0,50 L 800,50 M 0,75 L 800,75 M 0,100 L 800,100 M 0,125 L 800,125 M 0,150 L 800,150 M 0,175 L 800,175" />
    <path d="M 50,0 L 50,200 M 100,0 L 100,200 M 150,0 L 150,200 M 200,0 L 200,200 M 250,0 L 250,200 M 300,0 L 300,200 M 350,0 L 350,200 M 400,0 L 400,200 M 450,0 L 450,200 M 500,0 L 500,200 M 550,0 L 550,200 M 600,0 L 600,200 M 650,0 L 650,200 M 700,0 L 700,200 M 750,0 L 750,200" />
  </g>

  <!-- Animated Circuits -->
  <g>
    <!-- Left Circuit -->
    <path class="circuit-path" d="M 10 50 L 120 50 L 150 80 L 220 80" />
    <circle class="circuit-dot" cx="220" cy="80" r="3" />
    
    <!-- Top Right Circuit -->
    <path class="circuit-path" style="animation-delay: 1s;" d="M 780 40 L 680 40 L 650 70 L 600 70" />
    <circle class="circuit-dot" cx="600" cy="70" r="3" />

    <!-- Bottom Left Circuit -->
    <path class="circuit-path" style="animation-delay: 2s;" d="M 50 160 L 150 160 L 180 130 L 250 130" />
    <circle class="circuit-dot" cx="250" cy="130" r="3" />

    <!-- Bottom Right Circuit -->
    <path class="circuit-path" style="animation-delay: 1.5s;" d="M 750 150 L 630 150 L 600 120 L 520 120" />
    <circle class="circuit-dot" cx="520" cy="120" r="3" />
  </g>

  <!-- Center Decorative Shield/Mascot Silhouette (Hexagon Lock) -->
  <g transform="translate(380, 20) scale(0.8)" opacity="0.15">
    <polygon points="50,0 100,25 100,75 50,100 0,75 0,25" fill="none" stroke="#a855f7" stroke-width="3" filter="url(#neonGlow)"/>
    <path d="M 35 40 L 65 40 L 65 65 L 35 65 Z" fill="none" stroke="#a855f7" stroke-width="2"/>
    <path d="M 40 40 L 40 30 C 40 20, 60 20, 60 30 L 60 40" fill="none" stroke="#a855f7" stroke-width="2"/>
  </g>

  <!-- Console Logs (Cyberpunk Theme) -->
  <g transform="translate(30, 30)">
    <text x="0" y="0" class="console-text">&gt; SYSTEM STATUS: <tspan class="status-active">SECURE</tspan></text>
    <text x="0" y="15" class="console-text">&gt; PROTOCOL: ACTIVE_SHIELD_V4.9</text>
    <text x="0" y="30" class="console-text">&gt; DEPLOYMENT: EN_HUSSAIN_NODE_0</text>
  </g>

  <g transform="translate(620, 30)" text-anchor="end">
    <text x="0" y="0" class="console-text">LOC: 0x7F // ADDR: 127.0.0.1</text>
    <text x="0" y="15" class="console-text">DEFENSE LEVEL: MAXIMUM</text>
    <text x="0" y="30" class="console-text">COGNITIVE FLOW: STEADY</text>
  </g>

  <!-- Main Animated Text Group -->
  <g transform="translate(400, 105)" text-anchor="middle">
    <!-- Main Title: EN-HUSSAIN -->
    <text x="0" y="0" class="title" fill="#ffffff" stroke="#a855f7" stroke-width="1">EN-HUSSAIN</text>
    
    <!-- Subtitle with animated cursor -->
    <g transform="translate(0, 30)">
      <text x="0" y="0" class="subtitle">CYBERSECURITY ENGINEER // FULL-STACK DEVELOPER</text>
      <!-- Blinking block cursor -->
      <rect class="cursor" x="245" y="-14" width="8" height="15" />
    </g>
  </g>

  <!-- Bottom Cyberbar -->
  <g transform="translate(0, 185)">
    <line x1="20" y1="0" x2="780" y2="0" stroke="#a855f7" stroke-width="1" stroke-opacity="0.5" />
    <rect x="370" y="-3" width="60" height="6" fill="#a855f7" filter="url(#neonGlow)" />
  </g>
</svg>
